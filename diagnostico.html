<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagnóstico · Zetabé Copa del Mundo</title>
<style>
  :root{--gold:#e8b43a;--bg:#0a0a0c;--card:#15151a;--border:#2a2a32;--green:#3ecf8e;--red:#ff5c5c;--muted:#9a9aa5}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#eee;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;line-height:1.5;padding:24px}
  .wrap{max-width:660px;margin:0 auto}
  h1{font-size:1.3rem;color:var(--gold);margin:0 0 4px}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
  .title{font-weight:700;color:#fff;margin-bottom:8px}
  button{background:var(--gold);color:#1a1306;border:0;border-radius:10px;padding:12px 18px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
  button:disabled{opacity:.5;cursor:default}
  .line{padding:8px 12px;border-radius:8px;margin:8px 0;font-size:.92rem;word-break:break-word}
  .ok{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.4)}
  .err{background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.45)}
  .info{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
  .fix{background:rgba(232,180,58,.08);border:1px solid rgba(232,180,58,.4)}
  code{background:#000;padding:1px 5px;border-radius:5px;font-size:.85rem}
  pre{background:#000;border:1px solid var(--border);border-radius:8px;padding:12px;overflow:auto;font-size:.8rem;white-space:pre-wrap}
  b{color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <h1>Diagnóstico de predicciones</h1>
  <div class="sub">Prueba directa con el usuario <code>juliana.garcia@zetabe.com</code>.</div>

  <div class="card">
    <div class="title">1. Usuarios y predicciones en la base</div>
    <div id="out"><div class="line info">Conectando…</div></div>
  </div>

  <div class="card">
    <div class="title">2. Probar guardar una predicción con tu correo</div>
    <button id="btnWrite" disabled>Probar guardar (tu usuario)</button>
    <div id="out2"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = 'https://sijldvljrswbgbntwhkj.supabase.co';
  const SB_KEY = 'sb_publishable_FpCSdt_ci8AIyU_XMDVFwA_Fr-FVayu';
  const ME = 'juliana.garcia@zetabe.com';
  const TEST_MATCH = 'DIAG_TEST';

  const out  = document.getElementById('out');
  const out2 = document.getElementById('out2');
  const btn  = document.getElementById('btnWrite');

  function line(target, msg, cls){
    const d = document.createElement('div');
    d.className = 'line ' + (cls||'info');
    d.innerHTML = msg;
    target.appendChild(d);
  }
  function clear(t){ t.innerHTML=''; }

  let sb;
  try { sb = window.supabase.createClient(SB_URL, SB_KEY); }
  catch(e){ clear(out); line(out, '❌ No se pudo cargar la librería de Supabase. Revisa tu internet y recarga.', 'err'); }

  async function testRead(){
    clear(out);
    // usuarios
    let u;
    try { u = await sb.from('usuarios').select('email,nombre'); }
    catch(e){ line(out, '❌ Error de conexión: ' + e.message, 'err'); return; }
    if (u.error){ line(out, '❌ No se puede leer <code>usuarios</code>: <code>'+u.error.message+'</code>', 'err'); }
    else {
      line(out, '✅ Usuarios registrados en la base: <b>'+u.data.length+'</b>', 'ok');
      const me = u.data.find(x => (x.email||'').toLowerCase() === ME);
      if (me) line(out, '✅ Tu correo <code>'+ME+'</code> SÍ está registrado.', 'ok');
      else line(out, '⚠️ Tu correo <code>'+ME+'</code> NO aparece en usuarios. Tendrías que inscribirte primero en la app.', 'err');
    }
    // predicciones
    let p;
    try { p = await sb.from('predicciones').select('*'); }
    catch(e){ line(out, '❌ Error de conexión al leer predicciones: ' + e.message, 'err'); return; }
    if (p.error){
      line(out, '❌ <b>No se puede LEER</b> predicciones: <code>'+p.error.message+'</code>', 'err');
      line(out, 'Eso es una regla de permiso (RLS) bloqueando la lectura.', 'fix');
      return;
    }
    line(out, '✅ Predicciones guardadas en total: <b>'+p.data.length+'</b>', 'ok');
    const mine = p.data.filter(x => (x.email||'').toLowerCase() === ME && x.match_id !== TEST_MATCH);
    line(out, 'De esas, con tu correo: <b>'+mine.length+'</b>', mine.length ? 'ok' : 'info');
    if (mine.length) line(out, '<pre>'+JSON.stringify(mine.slice(0,5), null, 2)+'</pre>', 'info');
  }

  async function testWrite(){
    clear(out2);
    btn.disabled = true;
    const row = { email: ME, match_id: TEST_MATCH, gol_a: 7, gol_b: 3, updated_at: new Date().toISOString() };
    line(out2, 'Guardando una predicción de prueba (7–3) con tu correo…', 'info');

    let w;
    try { w = await sb.from('predicciones').upsert(row); }
    catch(e){ line(out2, '❌ Error de conexión al guardar: ' + e.message, 'err'); btn.disabled=false; return; }

    if (w.error){
      line(out2, '❌ <b>No se puede GUARDAR</b>: <code>'+w.error.message+'</code>'+(w.error.code?(' (código '+w.error.code+')'):''), 'err');
      const m=(w.error.message||'').toLowerCase();
      if (m.includes('foreign key')) line(out2, 'Causa: todavía está la regla que exige el correo en usuarios. Corre el SQL que quita <code>predicciones_email_fkey</code>.', 'fix');
      else if (m.includes('row-level security')) line(out2, 'Causa: falta el permiso de escritura (RLS).', 'fix');
      else if (m.includes('on conflict') || m.includes('unique')) line(out2, 'Causa: falta la llave primaria en (email, match_id).', 'fix');
      btn.disabled = false;
      return;
    }
    line(out2, '✅ Se guardó sin error.', 'ok');

    line(out2, 'Volviendo a leerla para confirmar…', 'info');
    const r2 = await sb.from('predicciones').select('*').eq('email', ME).eq('match_id', TEST_MATCH);
    if (r2.error){
      line(out2, '❌ Se guardó pero NO se puede releer: <code>'+r2.error.message+'</code>', 'err');
      line(out2, 'Es una regla (RLS) que deja escribir pero bloquea leer. Por eso "desaparecen" al recargar.', 'fix');
    } else if (r2.data.length){
      line(out2, '✅ <b>Perfecto:</b> se guardó y se vuelve a leer bien.', 'ok');
      line(out2, '➡️ Tu base guarda y lee correctamente. Si en la app igual no aparecen en "Mis predicciones", el problema ya no es la base — avísame y reviso el código.', 'fix');
    } else {
      line(out2, '⚠️ <b>Aquí está el problema:</b> guardó sin error pero al releer NO aparece.', 'err');
      line(out2, 'Regla (RLS) que permite escribir pero no leer. Eso explica que se pierdan al recargar.', 'fix');
    }
    try { await sb.from('predicciones').delete().eq('email', ME).eq('match_id', TEST_MATCH); } catch(e){}
    btn.disabled = false;
  }

  if (sb){
    btn.disabled = false;
    btn.onclick = testWrite;
    testRead();
  }
</script>
</body>
</html>
