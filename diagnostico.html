<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagnóstico · Zetabé Copa del Mundo</title>
<style>
  :root{--gold:#e8b43a;--bg:#0a0a0c;--card:#15151a;--border:#2a2a32;--green:#3ecf8e;--red:#ff5c5c;--muted:#9a9aa5}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#eee;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;line-height:1.5;padding:24px}
  .wrap{max-width:640px;margin:0 auto}
  h1{font-size:1.3rem;color:var(--gold);margin:0 0 4px}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
  button{background:var(--gold);color:#1a1306;border:0;border-radius:10px;padding:12px 18px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
  button:disabled{opacity:.5;cursor:default}
  .line{padding:8px 12px;border-radius:8px;margin:8px 0;font-size:.92rem;word-break:break-word}
  .ok{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.4)}
  .err{background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.45)}
  .info{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
  .fix{background:rgba(232,180,58,.08);border:1px solid rgba(232,180,58,.4)}
  code{background:#000;padding:1px 5px;border-radius:5px;font-size:.85rem}
  pre{background:#000;border:1px solid var(--border);border-radius:8px;padding:12px;overflow:auto;font-size:.8rem;white-space:pre-wrap}
  b{color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <h1>Diagnóstico de predicciones</h1>
  <div class="sub">Esta página se conecta a tu Supabase y revisa si las predicciones se guardan y se vuelven a leer bien.</div>

  <div class="card">
    <div id="out"><div class="line info">Conectando…</div></div>
  </div>

  <div class="card">
    <button id="btnWrite" disabled>Probar guardar una predicción de prueba</button>
    <div id="out2"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // === Tus datos (los mismos de tu app) ===
  const SB_URL = 'https://sijldvljrswbgbntwhkj.supabase.co';
  const SB_KEY = 'sb_publishable_FpCSdt_ci8AIyU_XMDVFwA_Fr-FVayu';
  const TEST_EMAIL = '__diagnostico_borrar__@test.com';

  const out  = document.getElementById('out');
  const out2 = document.getElementById('out2');
  const btn  = document.getElementById('btnWrite');

  function line(target, msg, cls){
    const d = document.createElement('div');
    d.className = 'line ' + (cls||'info');
    d.innerHTML = msg;
    target.appendChild(d);
  }
  function clear(t){ t.innerHTML=''; }

  let sb;
  try {
    sb = window.supabase.createClient(SB_URL, SB_KEY);
  } catch(e){
    clear(out);
    line(out, '❌ No se pudo cargar la librería de Supabase. Revisa tu conexión a internet y recarga.', 'err');
  }

  async function testRead(){
    clear(out);
    line(out, 'Leyendo la tabla <code>predicciones</code>…', 'info');
    let res;
    try { res = await sb.from('predicciones').select('*'); }
    catch(e){ clear(out); line(out, '❌ Error de conexión: ' + e.message, 'err'); return; }

    clear(out);
    if (res.error){
      line(out, '❌ <b>No se puede LEER</b> la tabla predicciones.', 'err');
      line(out, 'Mensaje de Supabase: <code>' + res.error.message + '</code>' + (res.error.code?(' (código '+res.error.code+')'):''), 'err');
      line(out, 'Causa probable: una regla de permiso (RLS) que bloquea la lectura.', 'fix');
      return;
    }
    line(out, '✅ Lectura OK. Hay <b>' + res.data.length + '</b> predicciones guardadas en total en la base.', 'ok');
    if (res.data.length){
      line(out, 'Ejemplo de una fila guardada:', 'info');
      const ex = res.data[0];
      line(out, '<pre>' + JSON.stringify(ex, null, 2) + '</pre>', 'info');
      line(out, 'Columnas detectadas: <code>' + Object.keys(ex).join(', ') + '</code>', 'info');
    } else {
      line(out, 'La tabla está vacía (todavía nadie tiene predicciones guardadas en la base). Usa el botón de abajo para probar si se puede guardar.', 'info');
    }
  }

  async function testWrite(){
    clear(out2);
    btn.disabled = true;
    const row = { email: TEST_EMAIL, match_id: 'm001', gol_a: 7, gol_b: 3, updated_at: new Date().toISOString() };
    line(out2, 'Intentando GUARDAR una predicción de prueba (7–3)…', 'info');

    let w;
    try { w = await sb.from('predicciones').upsert(row); }
    catch(e){ line(out2, '❌ Error de conexión al guardar: ' + e.message, 'err'); btn.disabled=false; return; }

    if (w.error){
      line(out2, '❌ <b>No se puede GUARDAR</b> en predicciones.', 'err');
      line(out2, 'Mensaje de Supabase: <code>' + w.error.message + '</code>' + (w.error.code?(' (código '+w.error.code+')'):''), 'err');
      if ((w.error.message||'').toLowerCase().includes('row-level security'))
        line(out2, 'Causa: falta el permiso de ESCRITURA (RLS). Hay que crear la política que permite insertar.', 'fix');
      else if ((w.error.message||'').toLowerCase().includes('on conflict') || (w.error.message||'').toLowerCase().includes('unique'))
        line(out2, 'Causa: a la tabla le falta la "llave primaria" en (email, match_id). Por eso el guardado falla.', 'fix');
      btn.disabled = false;
      return;
    }
    line(out2, '✅ Se guardó sin error.', 'ok');

    // releer para confirmar que de verdad quedó
    line(out2, 'Volviendo a leer la prueba para confirmar…', 'info');
    const r2 = await sb.from('predicciones').select('*').eq('email', TEST_EMAIL);
    if (r2.error){
      line(out2, '❌ Se guardó pero NO se puede releer: <code>' + r2.error.message + '</code>', 'err');
      line(out2, 'Causa: una regla (RLS) deja escribir pero bloquea la lectura. Esto explica que las predicciones "desaparezcan" al recargar.', 'fix');
    } else if (r2.data.length){
      line(out2, '✅ <b>Relectura OK</b>: la prueba se guardó y se puede volver a leer.', 'ok');
      line(out2, '➡️ Tu base de datos guarda y lee bien. Si en la app igual se pierden, el problema es otro (no la base). Avísame y seguimos por ahí.', 'fix');
    } else {
      line(out2, '⚠️ <b>Aquí está el problema</b>: se guardó sin error, pero al volver a leer NO aparece.', 'err');
      line(out2, 'Esto es una regla de permiso (RLS) que permite escribir pero NO devuelve las filas al leer. Por eso las predicciones se pierden al recargar.', 'fix');
    }

    // limpiar la fila de prueba
    try { await sb.from('predicciones').delete().eq('email', TEST_EMAIL); } catch(e){}
    btn.disabled = false;
  }

  if (sb){
    btn.disabled = false;
    btn.onclick = testWrite;
    window.addEventListener('load', testRead);
    testRead();
  }
</script>
</body>
</html>
